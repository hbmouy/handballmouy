        nav {

        @media (max-width: 950px) {
            nav { padding: 1rem 1.5rem; }

            .dropdown { width: 100%; }

            }
            .dropdown-content li a { font-size: 0.9rem !important; color: var(--muted); padding: 0.5rem 0; }
            .dropdown.active .dropdown-content { display: block; }
        }
