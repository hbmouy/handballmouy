<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" type="image/png" href="images/logo.png">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En construction - HBM</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    
    <style>
        /* --- BASE LUMINEUSE & STYLE MAILLOT POP-ART --- */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --jersey-yellow: #e2f438;  
            --jersey-green: #2cd646;   
            --jersey-purple: #9d4edd;  
            --font-display: 'Anton', sans-serif;
            --font-body: 'DM Sans', sans-serif;

            /* Mode Clair (par défaut) */
            --bg-body: #f5f8f5; 
            --bg-card: #ffffff; 
            --text-main: #0b130a;      
            --border-color: #0b130a;
            --shadow-color: #0b130a;
            --nav-bg: rgba(255, 255, 255, 0.85);
        }
        
        /* Mode Sombre */
        [data-theme="dark"] {
            --bg-body: #0b130a;
            --bg-card: #142113;
            --text-main: #f5f8f5;
            --border-color: #f5f8f5;
            --shadow-color: var(--jersey-green); 
            --nav-bg: rgba(11, 19, 10, 0.85);
        }
        
        body { 
            background: var(--bg-body); 
            color: var(--text-main); 
            font-family: var(--font-body); 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            text-align: center; 
            margin: 0;
            overflow-x: hidden;
            position: relative;
        }

        /* --- DESIGN GÉOMÉTRIQUE ASYMÉTRIQUE D'ARRIÈRE-PLAN --- */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.85;
            background: linear-gradient(135deg, var(--jersey-yellow) 30%, var(--jersey-green) 100%);
            clip-path: polygon(0 0, 100% 0, 100% 40vh, 0 65vh);
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            height: 95px; padding: 0 2rem; 
            background: var(--nav-bg); 
            backdrop-filter: blur(15px);
            border-bottom: 4px solid var(--border-color);
        }
        .nav-container {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; max-width: 1200px; height: 100%; position: relative;
        }
        .nav-logo {
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%); 
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: inherit; z-index: 1002;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .nav-logo img { height: 85px; filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.2)); }
        .nav-logo:hover { transform: translate(-50%, -50%) scale(1.08); }

        .nav-group { display: flex; gap: 1.4rem; list-style: none; align-items: center; width: 46%; }
        .nav-group.left { justify-content: flex-end; }  
        .nav-group.right { justify-content: flex-start; } 

        .nav-group a, .dropdown-trigger { 
            color: var(--text-main); text-decoration: none; 
            font-family: var(--font-display); font-size: 1.05rem; font-style: italic;
            text-transform: uppercase; letter-spacing: 0.03em; transition: 0.2s;
            cursor: pointer;; white-space: nowrap; }
        .nav-group a:hover, .dropdown-trigger:hover { color: var(--jersey-purple); }

        /* BURGER */
        .burger {
            display: none; flex-direction: column; justify-content: space-between;
            width: 30px; height: 21px; background: transparent; border: none; cursor: pointer; z-index: 1001;
        }
        .burger span { width: 100%; height: 3px; background-color: var(--text-main); transition: all 0.3s ease; }

        /* DROPDOWNS */
        .dropdown { position: relative; }
        .dropdown-content {
            display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
            background: var(--bg-card); min-width: 180px; border: 3px solid var(--border-color);
            padding: 0.5rem 0; list-style: none; box-shadow: 6px 6px 0px var(--shadow-color);
        }
        .dropdown-content li a { 
            padding: 0.6rem 1.2rem; font-family: var(--font-body); font-size: 0.9rem; 
            font-style: normal; display: block; text-transform: none; text-align: center; color: var(--text-main);
        }
        .dropdown-content li a:hover { background: var(--bg-body); color: var(--jersey-purple); }
        .dropdown:hover .dropdown-content { display: block; }
        
        /* Correction de l'ouverture au clic sur mobile */
        .dropdown.active .dropdown-content { 
            display: block; 
            position: static; 
            transform: none; 
            box-shadow: none; 
            border: none;
            border-left: 2px solid var(--jersey-purple);
            margin-left: 10px;
            padding-left: 5px;
        }

        /* --- BLOC CENTRAL DE CONSTRUCTION --- */
        .container { 
            padding: 50px 40px; 
            background: var(--bg-card);
            border: 4px solid var(--border-color);
            box-shadow: 12px 12px 0px var(--shadow-color);
            max-width: 600px;
            width: 90%;
            margin-top: 130px;
            margin-bottom: 40px;
            position: relative;
            z-index: 2;
            clip-path: polygon(0% 0%, 95% 0%, 100% 5%, 100% 100%, 5% 100%, 0% 95%);
        }
        
        h1 { 
            font-family: var(--font-display); 
            font-size: clamp(2.5rem, 6vw, 4.5rem); 
            font-style: italic;
            color: var(--text-main); 
            line-height: 1;
            margin-bottom: 1.5rem;
            text-shadow: 3px 3px 0px var(--jersey-yellow);
        }
        
        p { 
            font-size: 1.2rem; 
            color: var(--text-main); 
            font-weight: 500;
            margin-bottom: 2.5rem; 
        }
        
        /* BOUTON RETOUR POP-ART */
        .btn-back { 
            display: inline-block;
            background: var(--bg-card);
            border: 3px solid var(--border-color); 
            color: var(--text-main); 
            padding: 12px 30px; 
            text-decoration: none; 
            text-transform: uppercase; 
            font-family: var(--font-display);
            font-style: italic;
            font-size: 1.1rem; 
            letter-spacing: 1px;
            box-shadow: 5px 5px 0px var(--shadow-color);
            transition: 0.2s; 
        }
        .btn-back:hover { 
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px var(--jersey-purple);
            color: var(--jersey-purple);
        }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 992px) {
            nav { height: 75px; }
            .nav-container { justify-content: space-between; }
            .nav-logo { position: static; transform: none; }
            .nav-logo img { height: 60px; }
            .nav-logo:hover { transform: none; }
            .burger { display: flex; }
            
            .burger.toggle span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
            .burger.toggle span:nth-child(2) { opacity: 0; }
            .burger.toggle span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

            .nav-group {
                position: fixed; top: 0; width: 280px; height: 100vh;
                background: var(--bg-card); flex-direction: column; align-items: flex-start;
                padding: 100px 2rem 2rem 2rem; gap: 1.5rem; overflow-y: auto; z-index: 1000;
                text-align: left;
            }
            .nav-group.left { right: -100%; border-left: 4px solid var(--border-color); transition: right 0.4s ease; }
            .nav-group.right { display: none; } 
            .nav-group.left.active { right: 0; }

            .container { margin-top: 110px; padding: 30px 20px; clip-path: none; }
            body::before { clip-path: polygon(0 0, 100% 0, 100% 35vh, 0 50vh); }
        }
    
footer { text-align: center; padding: 40px; color: var(--text-main); font-weight: 700; border-top: 3px dashed var(--border-color); background: var(--bg-card); position: relative; z-index: 2; }
</style>
    <script src="nav-component.js"></script>
</head>
<body>
    
<div id="hbm-nav"></div>

<div class="container">
    <h1>PAGE EN CONSTRUCTION</h1>
    <p>Le club HBM se prépare. Cette page sera bientôt disponible !</p>
    <a href="index.html" class="btn-back">Retour à l'accueil</a>
</div>

</body>
</html>
