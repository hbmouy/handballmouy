<!DOCTYPE html>
<html lang="fr">
<head>
    <!-- ICÔNE DANS L'ONGLET (FAVICON) -->
    <link rel="icon" type="image/png" href="images/logo.png">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Bureau - HBM</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- ANTI-FLASH BLANC : Lecture immédiate du thème sélectionné -->
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    
    <style>
        /* --- BASE LUMINEUSE & STYLE MAILLOT POP-ART --- */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --jersey-yellow: #e2f438;  
            --jersey-green: #2cd646;   
            --jersey-purple: #9d4edd;  
            --font-display: 'Anton', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --gold: #d4af37;

            /* Mode Clair (par défaut) */
            --bg-body: #f5f8f5; 
            --bg-card: #ffffff; 
            --text-main: #0b130a;      
            --border-color: #0b130a;
            --shadow-color: #0b130a;
            --shadow-boss: var(--jersey-purple);
            --shadow-vice: var(--jersey-green);
            --nav-bg: rgba(255, 255, 255, 0.85);
            --role-bg: rgba(11, 19, 10, 0.06);
            --avatar-bg: #f5f8f5;
        }

        /* Mode Sombre */
        [data-theme="dark"] {
            --bg-body: #0b130a;
            --bg-card: #142113;
            --text-main: #f5f8f5;
            --border-color: #f5f8f5;
            --shadow-color: var(--jersey-green); 
            --shadow-boss: var(--jersey-purple);
            --shadow-vice: var(--jersey-yellow);
            --nav-bg: rgba(11, 19, 10, 0.85);
            --role-bg: rgba(255, 255, 255, 0.1);
            --avatar-bg: #0b130a;
        }

        body {
            background: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* --- GRAPHISMES DÉCOUPÉS --- */
        body::before, body::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 1200px;
            z-index: -1;
            opacity: 0.85;
            pointer-events: none;
        }
        body::before {
            top: 0; left: 0;
            background: linear-gradient(135deg, var(--jersey-yellow) 30%, var(--jersey-green) 100%);
            clip-path: polygon(0 0, 100% 0, 100% 320px, 65% 200px, 35% 450px, 0 250px);
        }
        body::after {
            bottom: 0; right: 0;
            background: linear-gradient(225deg, rgba(226, 244, 56, 0.5) 0%, rgba(44, 214, 70, 0.5) 100%);
            clip-path: polygon(100% 400px, 100% 100%, 0% 100%, 0% 700px, 50% 500px);
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            height: 95px; padding: 0 2rem; 
            background: var(--nav-bg); 
            backdrop-filter: blur(15px);
            border-bottom: 4px solid var(--border-color);
        }
        .nav-container {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; max-width: 1200px; height: 100%; position: relative;
        }
        .nav-logo {
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%); 
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: inherit; z-index: 1002;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .nav-logo img { height: 85px; filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.2)); }
        .nav-logo:hover { transform: translate(-50%, -50%) scale(1.08); }

        .nav-group { display: flex; gap: 1.4rem; list-style: none; align-items: center; width: 46%; }
        .nav-group.left { justify-content: flex-end; }  
        .nav-group.right { justify-content: flex-start; } 

        .nav-group a, .dropdown-trigger { 
            color: var(--text-main); text-decoration: none; 
            font-family: var(--font-display); font-size: 1.05rem; font-style: italic;
            text-transform: uppercase; letter-spacing: 0.03em; transition: 0.2s;
            cursor: pointer;; white-space: nowrap; }
        .nav-group a:hover, .dropdown-trigger:hover { color: var(--jersey-purple); }

        /* BURGER */
        .burger {
            display: none; flex-direction: column; justify-content: space-between;
            width: 30px; height: 21px; background: transparent; border: none; cursor: pointer; z-index: 1001;
        }
        .burger span { width: 100%; height: 3px; background-color: var(--text-main); transition: all 0.3s ease; }

        /* DROPDOWNS */
        .dropdown { position: relative; }
        .dropdown-content {
            display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
            background: var(--bg-card); min-width: 180px; border: 3px solid var(--border-color);
            padding: 0.5rem 0; list-style: none; box-shadow: 6px 6px 0px var(--shadow-color);
        }
        .dropdown-content li a { 
            padding: 0.6rem 1.2rem; font-family: var(--font-body); font-size: 0.9rem; 
            font-style: normal; display: block; text-transform: none; text-align: center; color: var(--text-main);
        }
        .dropdown-content li a:hover { background: var(--bg-body); color: var(--jersey-purple); }
        .dropdown:hover .dropdown-content { display: block; }

        /* Correction affichage mobile au clic */
        .dropdown.active .dropdown-content { 
            display: block; 
            position: static; 
            transform: none; 
            box-shadow: none; 
            border: none;
            border-left: 2px solid var(--jersey-purple);
            margin-left: 10px;
            padding-left: 5px;
        }

        /* --- HEADER --- */
        .page-header { padding: 160px 20px 20px; text-align: center; position: relative; z-index: 2; }
        
        .label-container { text-align: center; }
        .section-label { 
            color: var(--text-main); background: var(--bg-card);
            border: 2px solid var(--border-color); box-shadow: 3px 3px 0px var(--shadow-color);
            text-transform: uppercase; font-family: var(--font-display); font-style: italic; font-size: 1.2rem; 
            letter-spacing: 2px; display: inline-block; margin-bottom: 1rem; padding: 0.2rem 1rem;
            transform: rotate(-1deg);
        }

        h1 { 
            font-family: var(--font-display); font-size: clamp(2.5rem, 7vw, 4.5rem); 
            text-align: center; margin-bottom: 0.5rem; line-height: 1; font-style: italic; letter-spacing: -1px;
            text-shadow: 3px 3px 0px var(--bg-card), 6px 6px 0px var(--border-color);
        }

        /* --- ZONE ORGANIGRAMME GRID / POP-ART --- */
        .org-container {
            max-width: 1100px; margin: 0 auto; padding: 50px 20px 120px;
            display: flex; flex-direction: column; gap: 4rem; text-align: center;
            position: relative; z-index: 2;
        }
        .org-section { display: flex; flex-direction: column; gap: 2rem; }
        .org-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 3rem; }

        /* --- VIGNETTE / CARTE MEMBRE --- */
        .member-card {
            background: var(--bg-card);
            border: 3px solid var(--border-color);
            padding: 35px 25px; 
            box-shadow: 8px 8px 0px var(--shadow-color);
            width: 290px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            clip-path: polygon(0% 0%, 95% 0%, 100% 5%, 100% 100%, 5% 100%, 0% 95%);
        }
        .member-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px var(--border-color);
        }

        /* Avatar façon macaron de maillot */
        .member-avatar {
            width: 90px; height: 90px; 
            background: var(--avatar-bg);
            border: 3px solid var(--border-color);
            box-shadow: 4px 4px 0px var(--border-color);
            border-radius: 50%; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display); font-style: italic; font-size: 2.2rem; color: var(--jersey-purple);
        }

        .member-name { 
            font-family: var(--font-display); font-style: italic; font-size: 2.1rem; 
            line-height: 1.1; letter-spacing: 0.5px; color: var(--text-main); margin-bottom: 8px; 
        }
        .member-role { 
            background: var(--role-bg);
            color: var(--text-main); 
            border: 1px solid var(--border-color);
            display: inline-block;
            padding: 2px 10px;
            font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px;
        }

        /* Statuts spéciaux (Hiérarchie) */
        .member-card.boss { 
            width: 340px; 
            border: 4px solid var(--border-color);
            background: var(--bg-card);
            box-shadow: 12px 12px 0px var(--shadow-boss);
        }
        .member-card.boss:hover { box-shadow: 16px 16px 0px var(--border-color); }
        .boss .member-avatar { background: var(--jersey-yellow); color: #0b130a; width: 110px; height: 110px; font-size: 2.8rem; }
        .boss .member-role { background: var(--gold); color: #ffffff; border-color: var(--border-color); font-size: 0.85rem; padding: 4px 14px; box-shadow: 2px 2px 0px var(--border-color); }

        .member-card.vice { box-shadow: 8px 8px 0px var(--shadow-vice); }
        .member-card.vice:hover { box-shadow: 12px 12px 0px var(--border-color); }
        .vice .member-avatar { background: var(--jersey-green); color: #ffffff; }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 992px) {
            nav { height: 75px; }
            .nav-container { justify-content: space-between; }
            .nav-logo { position: static; transform: none; }
            .nav-logo img { height: 60px; }
            .nav-logo:hover { transform: none; }
            .burger { display: flex; }
            
            /* Burger animation */
            .burger.toggle span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
            .burger.toggle span:nth-child(2) { opacity: 0; }
            .burger.toggle span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

            .nav-group {
                position: fixed; top: 0; width: 280px; height: 100vh;
                background: var(--bg-card); flex-direction: column; align-items: flex-start;
                padding: 100px 2rem 2rem 2rem; gap: 1.5rem; overflow-y: auto; z-index: 1000;
            }
            .nav-group.left { right: -100%; border-left: 4px solid var(--border-color); transition: right 0.4s ease; }
            .nav-group.right { display: none; } 
            .nav-group.left.active { right: 0; }

            .page-header { padding-top: 130px; }
            body::before { clip-path: polygon(0 0, 100% 0, 100% 180px, 0 110px); }
            .org-container { gap: 2.5rem; padding-bottom: 60px; }
            .org-row { gap: 2rem; }
            .member-card, .member-card.boss { width: 100%; max-width: 300px; clip-path: none; }
        }
    
footer { text-align: center; padding: 40px; color: var(--text-main); font-weight: 700; border-top: 3px dashed var(--border-color); background: var(--bg-card); position: relative; z-index: 2; }
</style>
<script src="nav-component.js"></script>    
</head>
<body>

<div id="hbm-nav"></div>

<header class="page-header">
    <div class="label-container">
        <span class="section-label">Le Bureau du Handball Mouy</span>
    </div>
    <h1>L'ÉQUIPE DIRIGEANTE</h1>
</header>

<main class="org-container">

    <!-- PRÉSIDENT -->
    <section class="org-section">

                <div class="member-avatar">TR</div>
                <h3 class="member-name">Teddy Renard</h3>
                <span class="member-role">Président</span>
            </div>
        </div>
    </section>

    <!-- VICE-PRÉSIDENT -->
    <section class="org-section">
        <div class="org-row">
            <div class="member-card vice">
                <div class="member-avatar">GN</div>
                <h3 class="member-name">Guillaume Neullas</h3>
                <span class="member-role">Vice-Président</span>
            </div>
        </div>
    </section>

    <!-- AUTRES MEMBRES -->
    <section class="org-section">
        <div class="org-row">
            <div class="member-card">
                <div class="member-avatar">AF</div>
                <h3 class="member-name">Aline Fontaine</h3>
                <span class="member-role">Trésorière</span>
            </div>
            
            <div class="member-card">
                <div class="member-avatar">GG</div>
                <h3 class="member-name">Guillaume Gayral</h3>
                <span class="member-role">Secrétaire</span>
            </div>
            
            <div class="member-card">
                <div class="member-avatar">AP</div>
                <h3 class="member-name">Alexis Pippo</h3>
                <span class="member-role">Chargé de Communication</span>
            </div>
        </div>
    </section>

</main>

</body>
</html>
