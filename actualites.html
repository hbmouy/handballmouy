<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualités - HBM</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --jersey-yellow: #e2f438;
            --jersey-green: #2cd646;
            --jersey-purple: #9d4edd;
            --font-display: 'Anton', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --bg-body: #f5f8f5;
            --bg-card: #ffffff;
            --text-main: #0b130a;
            --border-color: #0b130a;
            --shadow-color: #0b130a;
            --nav-bg: rgba(255,255,255,0.85);
        }
        [data-theme="dark"] {
            --bg-body: #0b130a;
            --bg-card: #142113;
            --text-main: #dcdcdc;
            --border-color: #f5f8f5;
            --shadow-color: #2cd646;
            --nav-bg: rgba(11,19,10,0.85);
        }
        body {
            background: var(--bg-body); color: var(--text-main);
            font-family: var(--font-body); line-height: 1.8;
            overflow-x: hidden; position: relative;
            transition: background 0.3s, color 0.3s;
        }
        body::before, body::after { content: ""; position: absolute; width: 100%; height: 1200px; z-index: -1; opacity: 0.85; pointer-events: none; }
        body::before { top: 0; left: 0; background: linear-gradient(135deg, var(--jersey-yellow) 30%, var(--jersey-green) 100%); clip-path: polygon(0 0, 100% 0, 100% 350px, 70% 220px, 30% 480px, 0 280px); }
        body::after { top: 1200px; right: 0; width: 80%; background: linear-gradient(225deg, rgba(226,244,56,0.6) 0%, rgba(44,214,70,0.6) 100%); clip-path: polygon(100% 200px, 100% 800px, 20% 900px, 0% 600px, 40% 400px); }

        /* NAV */
        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; height: 95px; padding: 0 2rem; background: var(--nav-bg); backdrop-filter: blur(15px); border-bottom: 4px solid var(--border-color); }
        .nav-container { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 1200px; height: 100%; position: relative; }
        .nav-logo { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 1002; transition: 0.3s cubic-bezier(0.175,0.885,0.32,1.275); }
        .nav-logo img { height: 85px; filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.2)); }
        .nav-logo:hover { transform: translate(-50%,-50%) scale(1.08); }
        .nav-group { display: flex; gap: 2.5rem; list-style: none; align-items: center; width: 42%; }
        .nav-group.left { justify-content: flex-end; }
        .nav-group.right { justify-content: flex-start; }
        .nav-group a, .dropdown-trigger { color: var(--text-main); text-decoration: none; font-family: var(--font-display); font-size: 1.3rem; font-style: italic; text-transform: uppercase; letter-spacing: 0.05em; transition: 0.2s; cursor: pointer; }
        .nav-group a:hover, .dropdown-trigger:hover { color: var(--jersey-purple); }
        .nav-group a.active { color: var(--jersey-purple); }

        /* Theme toggle */
        .theme-toggle-btn { background: transparent; border: 2px solid var(--border-color); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 8px; box-shadow: 3px 3px 0px var(--border-color); transition: transform 0.2s, box-shadow 0.2s; }
        .theme-toggle-btn:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0px var(--jersey-purple); }
        .theme-toggle-btn svg { width: 22px; height: 22px; fill: none; stroke: var(--text-main); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .sun-icon { display: none; } .moon-icon { display: block; }
        [data-theme="dark"] .sun-icon { display: block; } [data-theme="dark"] .moon-icon { display: none; }

        /* BURGER */
        .menu-toggle { display: none; flex-direction: column; justify-content: space-between; width: 30px; height: 21px; background: transparent; border: none; cursor: pointer; z-index: 1001; }
        .menu-toggle span { width: 100%; height: 3px; background-color: var(--border-color); transition: all 0.3s ease; }
        .menu-toggle.active span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

        /* DROPDOWN */
        .dropdown { position: relative; }
        .dropdown-content { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background: var(--bg-card); min-width: 180px; border: 3px solid var(--border-color); padding: 0.5rem 0; list-style: none; box-shadow: 6px 6px 0px var(--shadow-color); }
        .dropdown-content li a { padding: 0.6rem 1.2rem; font-family: var(--font-body); font-size: 0.9rem; font-style: normal; display: block; text-transform: none; text-align: center; color: var(--text-main); }
        .dropdown-content li a:hover { background: var(--bg-body); color: var(--jersey-purple); }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown.active .dropdown-content { display: block; }

        /* CONTENU */
        .content-wrapper { max-width: 1100px; margin: 160px auto 40px; padding: 0 20px; position: relative; z-index: 2; }
        .label-container { text-align: center; }
        .section-label { color: var(--text-main); background: var(--bg-card); border: 2px solid var(--border-color); box-shadow: 3px 3px 0px var(--shadow-color); text-transform: uppercase; font-family: var(--font-display); font-style: italic; font-size: 1.2rem; letter-spacing: 2px; display: inline-block; margin: 0 auto 1rem auto; padding: 0.2rem 1rem; transform: rotate(-1deg); }
        h1 { font-family: var(--font-display); font-size: clamp(2.8rem,7.5vw,4.8rem); text-align: center; margin-bottom: 2rem; line-height: 1; font-style: italic; letter-spacing: -1px; color: var(--text-main); text-shadow: 4px 4px 0px var(--bg-card), 8px 8px 0px var(--shadow-color); }

        /* RECHERCHE */
        .search-wrapper { max-width: 500px; margin: 0 auto 4rem; padding: 0 20px; text-align: center; }
        .search-input { width: 100%; background: var(--bg-card); border: 3px solid var(--border-color); color: var(--text-main); padding: 12px 20px; font-size: 1rem; font-weight: 600; outline: none; transition: 0.3s; text-align: center; font-family: var(--font-body); box-shadow: 6px 6px 0px var(--shadow-color); }
        .search-input:focus { box-shadow: 6px 6px 0px var(--jersey-purple); }

        /* GRILLE */
        .news-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 3rem; margin-bottom: 4rem; }
        .news-card { background: var(--bg-card); border: 3px solid var(--border-color); position: relative; display: flex; flex-direction: column; box-shadow: 10px 10px 0px var(--shadow-color); clip-path: polygon(0% 0%, 98% 0%, 100% 4%, 100% 100%, 2% 100%, 0% 96%); transition: transform 0.3s, box-shadow 0.3s; }
        .news-card:hover { transform: translate(-2px,-2px); box-shadow: 12px 12px 0px var(--shadow-color); }
        .news-card.featured { grid-column: 1 / -1; box-shadow: 14px 14px 0px var(--shadow-color); }
        .news-card.featured::before { content: ''; position: absolute; top: 0; left: 0; width: 45px; height: 45px; background: var(--jersey-yellow); clip-path: polygon(0 0, 100% 0, 0 100%); z-index: 3; }
        .news-img { background: rgba(0,0,0,0.03); border-bottom: 3px solid var(--border-color); position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        [data-theme="dark"] .news-img { background: rgba(255,255,255,0.05); }
        .news-card.featured .news-img { height: 380px; }
        .news-style-block .news-img { height: 220px; }
        .news-img img { width: 100%; height: 100%; object-fit: contain; padding: 20px; transition: transform 0.5s; }
        .news-card:hover .news-img img { transform: scale(1.03); }

        /* BADGES */
        .badge { position: absolute; top: 15px; left: 15px; font-family: var(--font-display); font-style: italic; font-size: 1.1rem; padding: 2px 10px; border: 2px solid var(--border-color); box-shadow: 3px 3px 0px var(--shadow-color); z-index: 2; color: #0b130a; }
        .badge-match   { background: var(--jersey-green); }
        .badge-result  { background: var(--jersey-purple); color: #ffffff !important; }
        .badge-prepa   { background: var(--jersey-yellow); }
        .badge-sponsor { background: var(--jersey-green); }
        .badge-club    { background: var(--jersey-yellow); }
        .news-card.featured .badge { background: var(--jersey-purple); color: #ffffff; }

        .news-content { padding: 2rem; flex-grow: 1; display: flex; flex-direction: column; }
        .highlight { background: var(--jersey-purple); color: #ffffff; padding: 0.1rem 0.5rem; font-weight: 700; display: inline-block; transform: skewX(-10deg); }
        .highlight.date { background: var(--border-color); color: var(--bg-card); font-family: var(--font-display); font-style: italic; font-size: 0.9rem; letter-spacing: 1px; transform: none; }
        h2.news-title { font-family: var(--font-display); font-size: 2rem; font-style: italic; line-height: 1.2; text-transform: uppercase; margin: 0.8rem 0; color: var(--text-main); }
        .featured h2.news-title { font-size: 2.8rem; }
        h2.news-title a { color: inherit; text-decoration: none; }
        h2.news-title a:hover { color: var(--jersey-purple); }
        .news-excerpt { color: var(--text-main); font-size: 1.05rem; font-weight: 500; margin-bottom: 1.5rem; }
        .news-footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 2px dashed rgba(11,19,10,0.15); }
        [data-theme="dark"] .news-footer { border-top-color: rgba(245,248,245,0.2); }
        .partner-link { font-family: var(--font-display); font-style: italic; font-size: 1.2rem; color: var(--text-main); text-decoration: none; text-transform: uppercase; }
        .partner-link:hover { color: var(--jersey-green); text-decoration: underline; }
        .share-btn { background: var(--bg-card); border: 2px solid var(--border-color); color: var(--text-main); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 35px; height: 35px; box-shadow: 3px 3px 0px var(--shadow-color); transition: 0.2s; }
        .share-btn:hover { background: var(--jersey-yellow); color: #0b130a; transform: translate(-1px,-1px); box-shadow: 4px 4px 0px var(--shadow-color); }
        .share-btn svg { width: 18px; height: 18px; fill: currentColor; }

        /* ARCHIVES */
        .old-news { display: none; }
        .archive-section { text-align: center; padding: 20px 0 60px; }
        .load-btn { background: var(--bg-card); border: 3px solid var(--border-color); color: var(--text-main); padding: 12px 35px; cursor: pointer; font-family: var(--font-display); font-style: italic; font-size: 1.4rem; box-shadow: 6px 6px 0px var(--shadow-color); transition: 0.2s; text-transform: uppercase; }
        .load-btn:hover { background: var(--jersey-green); color: #0b130a; transform: translate(-2px,-2px); box-shadow: 8px 8px 0px var(--shadow-color); }

        /* LOADING */
        .loading { text-align: center; padding: 4rem; font-family: var(--font-display); font-size: 1.5rem; font-style: italic; opacity: 0.5; }

        /* TOAST */
        .toast-notification { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--border-color); color: var(--bg-card); padding: 12px 30px; border: 2px solid var(--jersey-yellow); font-family: var(--font-display); font-style: italic; font-size: 1.2rem; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 2000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }

        footer { text-align: center; padding: 60px; color: var(--text-main); font-weight: 700; border-top: 3px dashed var(--border-color); background: var(--bg-card); position: relative; z-index: 2; }

        @media (max-width: 992px) {
            nav { height: 75px; }
            .nav-container { justify-content: space-between; }
            .nav-logo { position: static; transform: none; }
            .nav-logo img { height: 60px; }
            .nav-logo:hover { transform: none; }
            .menu-toggle { display: flex; }
            .nav-group { position: fixed; top: 0; width: 280px; height: 100vh; background: var(--bg-card); flex-direction: column; align-items: flex-start; padding: 100px 2rem 2rem 2rem; gap: 1.5rem; overflow-y: auto; z-index: 1000; }
            .nav-group.left { right: -100%; border-left: 4px solid var(--border-color); transition: right 0.4s ease; }
            .nav-group.right { display: none; }
            .nav-group.left.active { right: 0; }
            .content-wrapper { margin-top: 120px; }
            body::before { clip-path: polygon(0 0, 100% 0, 100% 200px, 0 120px); }
            .news-card.featured .news-img { height: 240px; }
        }
        @media (max-width: 480px) {
            .news-card { clip-path: none; box-shadow: 6px 6px 0px var(--shadow-color); }
            .news-card.featured { box-shadow: 6px 6px 0px var(--shadow-color); }
            .news-content { padding: 1.5rem; }
            h2.news-title { font-size: 1.6rem; }
            .featured h2.news-title { font-size: 2rem; }
        }
    </style>
    <script src="nav-component.js"></script>
</head>
<body>

<div id="hbm-nav"></div>

<main class="content-wrapper">
    <div class="label-container">
        <span class="section-label">Les News du Club</span>
    </div>
    <h1>ACTUALITÉS</h1>

    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-input" placeholder="RECHERCHER UN MATCH, UN SPONSOR...">
    </div>

    <div class="news-container" id="newsContainer">
        <div class="loading">Chargement des actualités...</div>
    </div>

    <div class="archive-section" id="archiveSection" style="display:none;">
        <button class="load-btn" id="loadMoreBtn">VOIR TOUTES LES ACTUALITÉS</button>
    </div>
</main>

<footer>© 2026 HBM — Handball Mouy — L'aventure ne fait que commencer.</footer>
<div id="toast" class="toast-notification">Lien de l'actu copié ! 🦁</div>

<script>
// --- THÈME ---
document.getElementById('theme-toggle').addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('theme', 'light'); }
    else { document.documentElement.setAttribute('data-theme', 'dark'); localStorage.setItem('theme', 'dark'); }
});

// --- NAV MOBILE ---
const menuToggle = document.getElementById('menu-toggle');
const navLeft = document.getElementById('nav-left');
if (window.innerWidth <= 992) {
    document.querySelectorAll('.nav-group.right li').forEach(li => navLeft.appendChild(li.cloneNode(true)));
}
menuToggle.addEventListener('click', () => {
    menuToggle.classList.toggle('active');
    navLeft.classList.toggle('active');
});
document.querySelectorAll('.dropdown').forEach(dd => {
    dd.querySelector('.dropdown-trigger').addEventListener('click', e => {
        if (window.innerWidth <= 992) { e.preventDefault(); dd.classList.toggle('active'); }
    });
});

// --- PARTAGE ---
function shareActu(title, text) {
    if (navigator.share) { navigator.share({ title, text, url: window.location.href }).catch(() => {}); }
    else {
        navigator.clipboard.writeText(window.location.href).then(() => {
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        });
    }
}

// --- SVG PARTAGE ---
const shareSVG = `<svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>`;

// --- GÉNÉRATION DES CARTES ---
function buildCard(actu, index) {
    const isFeatured = actu.featured;
    const isArchive  = actu.archive;
    const badgeClass = `badge badge-${actu.badgeType}`;
    const titleHTML  = actu.lien
        ? `<a href="${actu.lien}">${actu.titre}</a>`
        : actu.titre;
    const footerLeft = actu.lien && actu.lienTexte
        ? `<a href="${actu.lien}" class="partner-link">${actu.lienTexte}</a>`
        : `<span></span>`;

    return `
    <article class="news-card ${isFeatured ? 'featured' : 'news-style-block'} ${isArchive ? 'old-news' : ''}" data-text="${actu.titre.toLowerCase()} ${actu.badge.toLowerCase()} ${actu.dateAffichee.toLowerCase()}">
        <div class="news-img">
            <div class="${badgeClass}">${actu.badge}</div>
            <img src="${actu.image}" alt="${actu.imageAlt}" loading="${index < 3 ? 'eager' : 'lazy'}">
        </div>
        <div class="news-content">
            <div><span class="highlight date">${actu.dateAffichee}</span></div>
            <h2 class="news-title">${titleHTML}</h2>
            <p class="news-excerpt">${actu.excerpt}</p>
            <div class="news-footer">
                ${footerLeft}
                <button class="share-btn" onclick="shareActu('${actu.partageTitle.replace(/'/g,"\\'")}', '${actu.partageText.replace(/'/g,"\\'")}'">${shareSVG}</button>
            </div>
        </div>
    </article>`;
}

// --- CHARGEMENT ACTUS ---
let allActus = [];
let isExpanded = false;

async function chargerActus() {
    try {
        const res  = await fetch('actus.json?v=' + Date.now());
        allActus   = await res.json();
        const container = document.getElementById('newsContainer');
        container.innerHTML = allActus.map((a, i) => buildCard(a, i)).join('');

        const hasArchives = allActus.some(a => a.archive);
        const archiveSection = document.getElementById('archiveSection');
        if (hasArchives) archiveSection.style.display = 'block';

        initSearch();
        initArchiveBtn();

    } catch(e) {
        document.getElementById('newsContainer').innerHTML = '<p style="text-align:center;opacity:0.5;padding:3rem;font-style:italic;">Impossible de charger les actualités.</p>';
        console.error('actus.json:', e);
    }
}

// --- RECHERCHE ---
function initSearch() {
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', e => {
        const q = e.target.value.toLowerCase().trim();
        document.querySelectorAll('.news-card').forEach(card => {
            const text = (card.dataset.text || '') + card.innerText.toLowerCase();
            card.style.display = text.includes(q) ? 'flex' : 'none';
        });
        document.getElementById('archiveSection').style.display = q.length > 0 ? 'none' : 'block';
        if (q.length === 0) {
            document.querySelectorAll('.old-news').forEach(n => n.style.display = isExpanded ? 'flex' : 'none');
        }
    });
}

// --- ARCHIVES ---
function initArchiveBtn() {
    const btn = document.getElementById('loadMoreBtn');
    btn.addEventListener('click', () => {
        isExpanded = !isExpanded;
        document.querySelectorAll('.old-news').forEach(n => n.style.display = isExpanded ? 'flex' : 'none');
        btn.innerText = isExpanded ? 'MASQUER LES ARCHIVES' : 'VOIR TOUTES LES ACTUALITÉS';
    });
}

chargerActus();
</script>
</body>
</html>
