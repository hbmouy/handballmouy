<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partenaires Officiels - HBM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* --- STYLES GÉNÉRAUX --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --dark: #0a0f08;
  --dark2: #121a0e;
  --green-mid: #228b22;
  --green-light: #2db82d;
  --green-bright: #3ddc3d;
  --white: #f0f5f0;
  --muted: #7a9a7a;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}
html { scroll-behavior: smooth; }
body {
  background: var(--dark);
  color: var(--white);
  font-family: var(--font-body);
  font-weight: 300;
  line-height: 1.7;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* --- NAV --- */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 3rem;
  background: rgba(10,15,8,0.85);
  backdrop-filter: blur(15px);
  border-bottom: 1px solid rgba(34,139,34,0.25);
}
.nav-logo { display: flex; align-items: center; gap: 0.8rem; text-decoration: none; z-index: 1100; }
.nav-logo img { height: 45px; width: auto; }
.nav-logo-text { font-family: var(--font-display); font-size: 1.4rem; color: var(--green-light); letter-spacing: 0.05em; }

.nav-links { display: flex; gap: 1.5rem; list-style: none; }
.nav-links a { color: var(--muted); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; transition: 0.3s; position: relative; }
.nav-links a:hover { color: var(--green-bright); }

/* BURGER */
.burger { display: none; cursor: pointer; flex-direction: column; gap: 6px; z-index: 1100; }
.burger div { width: 28px; height: 2px; background: var(--green-bright); transition: 0.4s; }

/* --- CONTENU PRINCIPAL --- */
main {
  flex: 1;
  padding-top: 150px;
  padding-bottom: 60px;
}
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 20px;
  text-align: center;
}
h1 {
  font-family: var(--font-display);
  font-size: clamp(3rem, 10vw, 5rem);
  color: var(--white);
  letter-spacing: 2px;
  margin-bottom: 1rem;
}
.subtitle {
  font-size: 1.3rem;
  color: var(--green-bright);
  font-weight: 400;
  margin-bottom: 4rem;
  letter-spacing: 1px;
}

/* --- GRILLE DES SPONSORS --- */
.sponsors-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 2rem;
}
.sponsor-card {
  border: 1px solid rgba(34,139,34,0.2);
  padding: 3rem 2rem;
  background: rgba(255,255,255,0.02);
  transition: 0.4s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  min-height: 250px;
}
.sponsor-card:hover {
  transform: translateY(-5px);
  border-color: var(--green-bright);
  background: rgba(34,139,34,0.05);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.sponsor-logo {
  max-width: 220px;
  max-height: 120px;
  width: auto;
  height: auto;
  display: block;
}
.sponsor-name {
  font-family: var(--font-display);
  font-size: 1.8rem;
  color: var(--white);
  letter-spacing: 1px;
}

/* --- BOUTON RETOUR --- */
.back-actions {
  margin-top: 5rem;
}
.btn-secondary {
  border: 1px solid var(--green-light);
  color: var(--green-light);
  padding: 1rem 2.5rem;
  text-decoration: none;
  text-transform: uppercase;
  font-family: var(--font-display);
  font-size: 1.2rem;
  letter-spacing: 1px;
  transition: 0.3s;
}
.btn-secondary:hover {
  background: var(--green-mid);
  color: white;
}

/* --- FOOTER --- */
footer {
  text-align: center;
  padding: 40px;
  color: var(--muted);
  font-size: 0.8rem;
  background: var(--dark2);
  border-top: 1px solid rgba(255,255,255,0.05);
}

/* --- MOBILE RESPONSIVE --- */
@media (max-width: 950px) {
  nav { padding: 1rem 1.5rem; }
  .burger { display: flex; }
  .nav-links {
    position: fixed;
    right: -100%;
    top: 0;
    height: 100vh;
    width: 100%;
    background: var(--dark);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: 0.5s cubic-bezier(0.77,0.2,0.05,1.0);
    z-index: 1000;
  }
  .nav-links.active { right: 0; }
  .nav-links a { font-size: 1.8rem; font-family: var(--font-display); }
  
  .burger.toggle .line1 { transform: rotate(-45deg) translate(-5px, 6px); }
  .burger.toggle .line2 { opacity: 0; }
  .burger.toggle .line3 { transform: rotate(45deg) translate(-5px, -6px); }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="images/logo.png" alt="HBM Logo">
    <span class="nav-logo-text">HBM</span>
  </a>

  <div class="burger" id="burger">
    <div class="line1"></div>
    <div class="line2"></div>
    <div class="line3"></div>
  </div>

  <ul class="nav-links" id="nav-links">
    <li><a href="index.html">Accueil</a></li>
    <li><a href="actualites.html">Actualités</a></li>
    <li><a href="equipes.html">Équipes</a></li>
    <li><a href="inscriptions.html">Inscriptions</a></li>
    <li><a href="partenaires.html">Partenaires</a></li>
    <li><a href="monclub.html">Mon Club</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
</nav>

<main>
  <div class="container">
    <h1>PARTENAIRES OFFICIELS</h1>
    <p class="subtitle">Ils soutiennent le club et nous font confiance.</p>
    
    <div class="sponsors-grid">
      <div class="sponsor-card">
        <img src="images/lv-chauff.png" alt="Logo LV CHAUFF" class="sponsor-logo">
        <span class="sponsor-name">LV CHAUFF</span>
      </div>
      
      <div class="sponsor-card">
        <img src="images/sirocco.png" alt="Logo Sirocco" class="sponsor-logo">
        <span class="sponsor-name">SIROCCO</span>
      </div>
      
      <div class="sponsor-card" style="opacity: 0.5; border-style: dashed;">
        <span style="font-size: 4rem; color: var(--muted);">➕</span>
        <span class="sponsor-name" style="color: var(--muted);">Futur Partenaire</span>
      </div>
    </div>
    
    <div class="back-actions">
      <a href="index.html" class="btn-secondary">Retour à l'accueil</a>
    </div>
  </div>
</main>

<footer>
  &copy; 2026 HBM — Handball Club Mouy — Tous droits réservés
</footer>

<script>
  const burger = document.getElementById('burger');
  const navLinks = document.getElementById('nav-links');

  burger.addEventListener('click', () => {
      navLinks.classList.toggle('active');
      burger.classList.toggle('toggle');
  });

  document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', () => {
          navLinks.classList.remove('active');
          burger.classList.remove('toggle');
      });
  });
</script>

</body>
</html>
