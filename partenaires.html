<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="icon" type="image/png" href="images/logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partenaires Officiels - HBM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* --- BASE LUMINEUSE & STYLE MAILLOT POP-ART --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --jersey-yellow: #e2f438;  
  --jersey-green: #2cd646;   
  --jersey-purple: #9d4edd;  
  --font-display: 'Anton', sans-serif;
  --font-body: 'DM Sans', sans-serif;

  /* Mode Clair (par défaut) */
  --bg-body: #f5f8f5; 
  --bg-card: #ffffff; 
  --text-main: #0b130a;      
  --border-color: #0b130a;
  --shadow-color: #0b130a;
  --nav-bg: rgba(255, 255, 255, 0.85);
}

/* Mode Sombre */
[data-theme="dark"] {
  --bg-body: #0b130a;
  --bg-card: #142113;
  --text-main: #f5f8f5;
  --border-color: #f5f8f5;
  --shadow-color: var(--jersey-green); 
  --nav-bg: rgba(11, 19, 10, 0.85);
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg-body);
  color: var(--text-main);
  font-family: var(--font-body);
  line-height: 1.7;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  position: relative;
}

/* --- DESIGN GÉOMÉTRIQUE ASYMÉTRIQUE --- */
body::before, body::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 1200px;
  z-index: -1;
  opacity: 0.85;
  pointer-events: none;
}
body::before {
  top: 0; left: 0;
  background: linear-gradient(135deg, var(--jersey-yellow) 30%, var(--jersey-green) 100%);
  clip-path: polygon(0 0, 100% 0, 100% 320px, 65% 200px, 35% 450px, 0 250px);
}
body::after {
  bottom: 0; right: 0;
  background: linear-gradient(225deg, rgba(226, 244, 56, 0.5) 0%, rgba(44, 214, 70, 0.5) 100%);
  clip-path: polygon(100% 400px, 100% 100%, 0% 100%, 0% 700px, 50% 500px);
}

/* --- NAVIGATION --- */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  height: 95px; padding: 0 2rem; 
  background: var(--nav-bg); 
  backdrop-filter: blur(15px);
  border-bottom: 4px solid var(--border-color);
}
.nav-container {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; max-width: 1200px; height: 100%; position: relative;
}
.nav-logo {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%); 
  display: flex; align-items: center; justify-content: center;
  text-decoration: none; color: inherit; z-index: 1002;
  transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.nav-logo img { height: 85px; filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.2)); }
.nav-logo:hover { transform: translate(-50%, -50%) scale(1.08); }

.nav-group { display: flex; gap: 2.5rem; list-style: none; align-items: center; width: 42%; }
.nav-group.left { justify-content: flex-end; }  
.nav-group.right { justify-content: flex-start; } 

.nav-group a, .dropdown-trigger { 
  color: var(--text-main); text-decoration: none; 
  font-family: var(--font-display); font-size: 1.3rem; font-style: italic;
  text-transform: uppercase; letter-spacing: 0.05em; transition: 0.2s;
  cursor: pointer;
}
.nav-group a:hover, .dropdown-trigger:hover { color: var(--jersey-purple); }

/* BURGER */
.menu-toggle {
  display: none; flex-direction: column; justify-content: space-between;
  width: 30px; height: 21px; background: transparent; border: none; cursor: pointer; z-index: 1001;
}
.menu-toggle span { width: 100%; height: 3px; background-color: var(--text-main); transition: all 0.3s ease; }

/* DROPDOWNS */
.dropdown { position: relative; }
.dropdown-content {
  display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
  background: var(--bg-card); min-width: 180px; border: 3px solid var(--border-color);
  padding: 0.5rem 0; list-style: none; box-shadow: 6px 6px 0px var(--shadow-color);
}
.dropdown-content li a { 
  padding: 0.6rem 1.2rem; font-family: var(--font-body); font-size: 0.9rem; 
  font-style: normal; display: block; text-transform: none; text-align: center; color: var(--text-main);
}
.dropdown-content li a:hover { background: var(--bg-body); color: var(--jersey-purple); }
.dropdown:hover .dropdown-content { display: block; }

/* Correction affichage mobile au clic */
.dropdown.active .dropdown-content { 
  display: block; 
  position: static; 
  transform: none; 
  box-shadow: none; 
  border: none;
  border-left: 2px solid var(--jersey-purple);
  margin-left: 10px;
  padding-left: 5px;
}

/* --- CONTENU PRINCIPAL --- */
main {
  flex: 1;
  padding-top: 160px;
  padding-bottom: 80px;
  position: relative;
  z-index: 2;
}
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 20px;
  text-align: center;
}

.label-container { text-align: center; }
.section-label { 
  color: var(--text-main); background: var(--bg-card);
  border: 2px solid var(--border-color); box-shadow: 3px 3px 0px var(--shadow-color);
  text-transform: uppercase; font-family: var(--font-display); font-style: italic; font-size: 1.2rem; 
  letter-spacing: 2px; display: inline-block; margin-bottom: 1rem; padding: 0.2rem 1rem;
  transform: rotate(-1deg);
}

h1 { 
  font-family: var(--font-display); font-size: clamp(2.5rem, 7.5vw, 4.5rem); 
  text-align: center; margin-bottom: 0.5rem; line-height: 1; font-style: italic; letter-spacing: -1px;
  text-shadow: 3px 3px 0px var(--bg-card), 6px 6px 0px var(--border-color);
}
.subtitle { 
  display: inline-block; background: var(--border-color); color: var(--bg-body);
  font-family: var(--font-display); font-style: italic; font-size: 1.3rem;
  padding: 2px 12px; transform: skewX(-10deg); letter-spacing: 0.5px;
  margin-bottom: 4rem;
}

/* --- GRILLE DES SPONSORS --- */
.sponsors-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 2.5rem;
}
.sponsor-card {
  background: var(--bg-card);
  border: 3px solid var(--border-color);
  padding: 3rem 2rem;
  box-shadow: 8px 8px 0px var(--shadow-color);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  min-height: 280px;
  clip-path: polygon(0% 0%, 95% 0%, 100% 5%, 100% 100%, 5% 100%, 0% 95%);
}
.sponsor-card:hover {
  transform: translate(-4px, -4px);
  box-shadow: 12px 12px 0px var(--jersey-purple);
}
.sponsor-logo {
  max-width: 220px;
  max-height: 120px;
  width: auto;
  height: auto;
  display: block;
  filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.05));
  transition: transform 0.3s ease;
}
.sponsor-card:hover .sponsor-logo {
  transform: scale(1.05);
}
.sponsor-name {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.9rem;
  color: var(--text-main);
  letter-spacing: 0.5px;
}

/* --- BOUTON RETOUR POP-ART --- */
.back-actions { margin-top: 5rem; }
.btn-secondary {
  display: inline-block;
  background: var(--bg-card);
  border: 3px solid var(--border-color);
  color: var(--text-main);
  padding: 0.8rem 2.5rem;
  text-decoration: none;
  text-transform: uppercase;
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.4rem;
  letter-spacing: 1px;
  box-shadow: 5px 5px 0px var(--shadow-color);
  transition: 0.2s;
}
.btn-secondary:hover { 
  transform: translate(-2px, -2px);
  box-shadow: 7px 7px 0px var(--jersey-green);
  background: var(--bg-card);
  color: var(--text-main);
}

/* --- FOOTER --- */
footer { 
  text-align: center; padding: 40px; color: var(--text-main); font-weight: 700;
  border-top: 3px dashed var(--border-color); 
  background: var(--bg-card);
  position: relative; z-index: 2;
}

/* --- MOBILE RESPONSIVE --- */
@media (max-width: 992px) {
  nav { height: 75px; }
  .nav-container { justify-content: space-between; }
  .nav-logo { position: static; transform: none; }
  .nav-logo img { height: 60px; }
  .nav-logo:hover { transform: none; }
  .menu-toggle { display: flex; }
  
  .menu-toggle.active span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
  .menu-toggle.active span:nth-child(2) { opacity: 0; }
  .menu-toggle.active span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

  .nav-group {
    position: fixed; top: 0; width: 280px; height: 100vh;
    background: var(--bg-card); flex-direction: column; align-items: flex-start;
    padding: 100px 2rem 2rem 2rem; gap: 1.5rem; overflow-y: auto; z-index: 1000;
  }
  .nav-group.left { right: -100%; border-left: 4px solid var(--border-color); transition: right 0.4s ease; }
  .nav-group.right { display: none; } 
  .nav-group.left.active { right: 0; }

  main { padding-top: 130px; }
  body::before { clip-path: polygon(0 0, 100% 0, 100% 180px, 0 110px); }
  .sponsor-card { clip-path: none; max-width: 320px; margin: 0 auto; width: 100%; }
}
</style>
<script>
  if (localStorage.getItem('theme') === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
</script>
<script src="nav-component.js"></script>  
</head>
<body>

<div id="hbm-nav"></div>

<main>
  <div class="container">
    <div class="label-container">
      <span class="section-label">Handball Mouy</span>
    </div>
    <h1>PARTENAIRES OFFICIELS</h1>
    <p class="subtitle">Ils soutiennent le club et nous font confiance.</p>
    
    <div class="sponsors-grid">
      <div class="sponsor-card">
        <img src="images/lv-chauff.png" alt="Logo LV CHAUFF" class="sponsor-logo">
        <span class="sponsor-name">LV CHAUFF</span>
      </div>
      
      <div class="sponsor-card">
        <img src="images/sirocco.png" alt="Logo Sirocco" class="sponsor-logo">
        <span class="sponsor-name">SIROCCO</span>
      </div>

      <div class="sponsor-card">
        <img src="images/tvm.png" alt="Logo TVM" class="sponsor-logo">
        <span class="sponsor-name">TVM TECHNOLOGIE</span>
      </div>

      <div class="sponsor-card">
        <img src="images/klein.png" alt="Logo Klein" class="sponsor-logo">
        <span class="sponsor-name">Klein</span>
      </div>

      <div class="sponsor-card">
        <img src="images/cerclevert.png" alt="Logo Cercle Vert" class="sponsor-logo">
        <span class="sponsor-name">GROUPE CERCLE VERT</span>
      </div>
    </div>
    
    <div class="back-actions">
      <a href="index.html" class="btn-secondary">Retour à l'accueil</a>
    </div>
  </div>
</main>

<footer>
  &copy; 2026 HBM — Handball Club Mouy — Tous droits réservés
</footer>

<script>
const menuToggle = document.querySelector('.menu-toggle');
const navGroupLeft = document.querySelector('.nav-group.left');
const navGroupRight = document.querySelector('.nav-group.right');

// Fusion des menus pour l'affichage mobile
if (window.innerWidth <= 992) {
  const rightLinks = navGroupRight.querySelectorAll('li');
  rightLinks.forEach(link => navGroupLeft.appendChild(link.cloneNode(true)));
}

const dropdowns = document.querySelectorAll('.dropdown');

menuToggle.addEventListener('click', () => {
  menuToggle.classList.toggle('active');
  navGroupLeft.classList.toggle('active');
});

dropdowns.forEach(dropdown => {
  const trigger = dropdown.querySelector('.dropdown-trigger');
  trigger.addEventListener('click', (e) => {
    if (window.innerWidth <= 992) {
      e.preventDefault();
      dropdown.classList.toggle('active');
    }
  });
});

// Fermeture auto sur clic (liens classiques)
document.querySelectorAll('.nav-group a:not(.dropdown-trigger)').forEach(link => {
  link.addEventListener('click', () => {
    navGroupLeft.classList.remove('active');
    menuToggle.classList.remove('active');
  });
});
</script>
</body>
</html>
