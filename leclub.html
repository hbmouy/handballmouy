<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="icon" type="image/png" href="images/logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Club - HBM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --jersey-yellow: #e2f438; --jersey-green: #2cd646; --jersey-purple: #9d4edd;
  --font-display: 'Anton', sans-serif; --font-body: 'DM Sans', sans-serif;
  --bg-body: #f5f8f5; --bg-card: #ffffff; --text-main: #0b130a;
  --border-color: #0b130a; --shadow-color: #0b130a; --nav-bg: rgba(255,255,255,0.85);
}
[data-theme="dark"] {
  --bg-body: #0b130a; --bg-card: #142113; --text-main: #f5f8f5;
  --border-color: #f5f8f5; --shadow-color: var(--jersey-green);
  --nav-bg: rgba(11,19,10,0.85);
}
body { background: var(--bg-body); color: var(--text-main); font-family: var(--font-body); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; position: relative; }
body::before, body::after { content: ""; position: absolute; width: 100%; height: 100%; z-index: -1; opacity: 0.85; pointer-events: none; }
body::before { top: 0; left: 0; background: linear-gradient(135deg, var(--jersey-yellow) 30%, var(--jersey-green) 100%); clip-path: polygon(0 0, 100% 0, 100% 250px, 0 150px); }
body::after { bottom: 0; right: 0; background: linear-gradient(225deg, rgba(226,244,56,0.4) 0%, rgba(44,214,70,0.4) 100%); clip-path: polygon(100% 80%, 100% 100%, 0% 100%, 0% 90%); }
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; height: 95px; padding: 0 2rem; background: var(--nav-bg); backdrop-filter: blur(15px); border-bottom: 4px solid var(--border-color); transition: background 0.3s, border-color 0.3s; }
.nav-container { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 1200px; height: 100%; position: relative; }
.nav-logo { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 1002; transition: 0.3s cubic-bezier(0.175,0.885,0.32,1.275); }
.nav-logo img { height: 85px; filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.2)); }
.nav-logo:hover { transform: translate(-50%,-50%) scale(1.08); }
.nav-group { display: flex; gap: 2.5rem; list-style: none; align-items: center; width: 42%; }
.nav-group.left { justify-content: flex-end; } .nav-group.right { justify-content: flex-start; }
.nav-group a, .dropdown-trigger { color: var(--text-main); text-decoration: none; font-family: var(--font-display); font-size: 1.3rem; font-style: italic; text-transform: uppercase; letter-spacing: 0.05em; transition: 0.2s; cursor: pointer; }
.nav-group a:hover, .dropdown-trigger:hover { color: var(--jersey-purple); }
.theme-toggle-btn { background: transparent; border: 2px solid var(--border-color); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 8px; box-shadow: 3px 3px 0px var(--border-color); transition: transform 0.2s, box-shadow 0.2s; }
.theme-toggle-btn:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0px var(--jersey-purple); }
.theme-toggle-btn svg { width: 22px; height: 22px; fill: none; stroke: var(--text-main); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
.sun-icon { display: none; } .moon-icon { display: block; }
[data-theme="dark"] .sun-icon { display: block; } [data-theme="dark"] .moon-icon { display: none; }
.burger { display: none; flex-direction: column; justify-content: space-between; width: 30px; height: 21px; background: transparent; border: none; cursor: pointer; z-index: 1100; }
.burger span { width: 100%; height: 3px; background-color: var(--border-color); transition: all 0.3s ease; }
.burger.toggle span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
.burger.toggle span:nth-child(2) { opacity: 0; }
.burger.toggle span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }
.dropdown { position: relative; }
.dropdown-content { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background: var(--bg-card); min-width: 180px; border: 3px solid var(--border-color); padding: 0.5rem 0; list-style: none; box-shadow: 6px 6px 0px var(--shadow-color); }
.dropdown-content li a { padding: 0.6rem 1.2rem; font-family: var(--font-body); font-size: 0.9rem; font-style: normal; display: block; text-transform: none; text-align: center; color: var(--text-main); }
.dropdown-content li a:hover { background: var(--bg-body); color: var(--jersey-purple); }
.dropdown:hover .dropdown-content { display: block; }
.dropdown.active .dropdown-content { display: block; }
@media (max-width: 950px) {
  nav { height: 70px; }
  .nav-logo { position: static; transform: none; }
  .nav-logo:hover { transform: scale(1.05); }
  .nav-logo img { height: 55px; }
  .burger { display: flex; }
  .nav-group.right { display: none; }
  .nav-group.left { position: fixed; right: -100%; top: 0; height: 100vh; width: 280px; background: var(--bg-card); border-left: 4px solid var(--border-color); flex-direction: column; align-items: flex-start; justify-content: flex-start; padding: 100px 2rem 2rem; gap: 1.5rem; transition: right 0.4s ease; overflow-y: auto; z-index: 1000; }
  .nav-group.left.active { right: 0; }
  .nav-group.left a { font-size: 1.3rem; width: 100%; display: block; }
  .dropdown { width: 100%; }
  .dropdown-content { position: static; transform: none; background: var(--bg-body); border: none; border-left: 3px solid var(--jersey-purple); box-shadow: none; padding: 0 0 0 1rem; margin-top: 0.5rem; }
  .dropdown-content li a { text-align: left; }
}
main { flex: 1; display: flex; align-items: center; justify-content: center; padding-top: 150px; padding-bottom: 50px; position: relative; z-index: 2; }
.container { max-width: 600px; width: 90%; background: var(--bg-card); border: 3px solid var(--border-color); padding: 3rem; box-shadow: 10px 10px 0px var(--shadow-color); text-align: center; clip-path: polygon(0% 0%, 95% 0%, 100% 5%, 100% 100%, 5% 100%, 0% 95%); }
h1 { font-family: var(--font-display); font-size: 3.5rem; font-style: italic; margin-bottom: 1.5rem; text-shadow: 2px 2px 0px var(--jersey-yellow); }
p { font-size: 1.2rem; margin-bottom: 2rem; font-weight: 500; }
.btn-back { display: inline-block; background: var(--bg-card); border: 3px solid var(--border-color); color: var(--text-main); padding: 0.8rem 2.5rem; text-decoration: none; text-transform: uppercase; font-family: var(--font-display); font-style: italic; font-size: 1.3rem; box-shadow: 5px 5px 0px var(--shadow-color); transition: 0.2s; }
.btn-back:hover { transform: translate(-2px,-2px); box-shadow: 7px 7px 0px var(--jersey-purple); }
footer { text-align: center; padding: 40px; color: var(--text-main); font-weight: 700; border-top: 3px dashed var(--border-color); background: var(--bg-card); position: relative; z-index: 2; }
</style>
<script>if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');</script>
<script src="nav-component.js"></script>
</head>
<body>

<div id="hbm-nav"></div>

<main>
  <div class="container">
    <h1>PAGE EN CONSTRUCTION</h1>
    <p>Le club HBM se prépare. Cette page sera bientôt disponible !</p>
    <a href="index.html" class="btn-back">Retour à l'accueil</a>
  </div>
</main>

<footer>&copy; 2026 HBM — Handball Club Mouy — Tous droits réservés</footer>

</body>
