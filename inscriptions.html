<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="icon" type="image/png" href="images/logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page en Construction - HBM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* --- BASE LUMINEUSE & STYLE MAILLOT POP-ART --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --jersey-yellow: #e2f438;  
  --jersey-green: #2cd646;   
  --jersey-purple: #9d4edd;  
  --font-display: 'Anton', sans-serif;
  --font-body: 'DM Sans', sans-serif;

  /* Mode Clair (par défaut) */
  --bg-body: #f5f8f5; 
  --bg-card: #ffffff; 
  --text-main: #0b130a;      
  --border-color: #0b130a;
  --shadow-color: #0b130a;
}

/* Mode Sombre */
[data-theme="dark"] {
  --bg-body: #0b130a;
  --bg-card: #142113;
  --text-main: #f5f8f5;
  --border-color: #f5f8f5;
  --shadow-color: var(--jersey-green); 
}

body {
  background: var(--bg-body);
  color: var(--text-main);
  font-family: var(--font-body);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
  padding: 20px;
}

/* --- DESIGN GÉOMÉTRIQUE ASYMÉTRIQUE --- */
body::before, body::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: -1;
  opacity: 0.85;
  pointer-events: none;
}
body::before {
  top: 0; left: 0;
  background: linear-gradient(135deg, var(--jersey-yellow) 30%, var(--jersey-green) 100%);
  clip-path: polygon(0 0, 100% 0, 100% 40%, 0 25%);
}
body::after {
  bottom: 0; right: 0;
  background: linear-gradient(225deg, rgba(226, 244, 56, 0.4) 0%, rgba(44, 214, 70, 0.4) 100%);
  clip-path: polygon(100% 70%, 100% 100%, 0 100%, 0 85%);
}

/* --- BLOC CENTRAL POP-ART --- */
.container {
  max-width: 600px;
  width: 100%;
  background: var(--bg-card);
  border: 3px solid var(--border-color);
  padding: 3.5rem 2rem;
  box-shadow: 10px 10px 0px var(--shadow-color);
  text-align: center;
  position: relative;
  z-index: 2;
  clip-path: polygon(0% 0%, 95% 0%, 100% 5%, 100% 100%, 5% 100%, 0% 95%);
}

.label-container { margin-bottom: 1.5rem; }
.section-label { 
  color: var(--text-main); background: var(--bg-card);
  border: 2px solid var(--border-color); box-shadow: 3px 3px 0px var(--shadow-color);
  text-transform: uppercase; font-family: var(--font-display); font-style: italic; font-size: 1.1rem; 
  letter-spacing: 2px; display: inline-block; padding: 0.2rem 1rem;
  transform: rotate(-1deg);
}

h1 {
  font-family: var(--font-display);
  font-size: clamp(2.5rem, 6vw, 4rem);
  font-style: italic;
  line-height: 1.1;
  margin-bottom: 1.5rem;
  letter-spacing: -0.5px;
  text-shadow: 2px 2px 0px var(--jersey-yellow);
}

p {
  font-size: 1.2rem;
  margin-bottom: 2.5rem;
  font-weight: 500;
}

/* --- BOUTON POP-ART --- */
.btn-back {
  display: inline-block;
  background: var(--bg-card);
  border: 3px solid var(--border-color);
  color: var(--text-main);
  padding: 0.8rem 2.5rem;
  text-decoration: none;
  text-transform: uppercase;
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.3rem;
  letter-spacing: 1px;
  box-shadow: 5px 5px 0px var(--shadow-color);
  transition: 0.2s;
}

.btn-back:hover {
  transform: translate(-2px, -2px);
  box-shadow: 7px 7px 0px var(--jersey-purple);
  background: var(--bg-card);
  color: var(--text-main);
}

/* --- MOBILE RESPONSIVE --- */
@media (max-width: 768px) {
  .container { clip-path: none; padding: 2.5rem 1.5rem; }
  body::before { clip-path: polygon(0 0, 100% 0, 100% 30%, 0 15%); }
  body::after { clip-path: polygon(100% 80%, 100% 100%, 0 100%, 0 90%); }
}
</style>
<!-- SCRIPT ANTI-FLASH BLANC -->
<script>
  if (localStorage.getItem('theme') === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
</script>
</head>
<body>

<div class="container">
  <div class="label-container">
    <span class="section-label">Handball Club Mouy</span>
  </div>
  <h1>PAGE EN CONFLICT / CONSTRUCTION</h1>
  <p>Le club HBM se prépare sur le terrain. Cette tactique sera bientôt disponible !</p>
  <a href="index.html" class="btn-back">Retour à l'accueil</a>
</div>

</body>
</html>
